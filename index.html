<!DOCTYPE html>
<html>

<head>
	<title>Virtual Desktop</title>
	<link href="./css/main.css" rel="stylesheet" />
	<link href="./css/accordion.css" rel="stylesheet" />
	<link href="./css/dialog.css" rel="stylesheet" />
</head>

<body>
	<button onClick="addCategory()">+ Category</button>
	<div id="categories">

	</div>

	<dialog id="confirm-prompt">
		<form method="dialog">
			<p id="confirm-text"></p>
			<hr>
			<div class="dialog-actions">
				<button value="cancel">Cancel</button>
				<button value="submit">OK</button>
			</div>
		</form>
	</dialog>

	<dialog id="input-prompt">
		<form method="dialog">
			<p id="input-text"></p>
			<label id="input-prompt-label" for="input-prompt-input"></label>
			<input type="text" id="input-prompt-input" name="input" required>
			<hr>
			<div class="dialog-actions">
				<button value="submit">Submit</button>
			</div>
		</form>
	</dialog>


	<ul id="context-menu" class="context-menu" style="display: none;">
		<li class="context-menu-item" id="rename-shortcut">Rename</li>
		<li class="context-menu-item" id="remove-shortcut">Remove</li>
	</ul>

	<script src="https://d3js.org/d3.v5.min.js"></script>
	<script src="./scripts/populateIcons.js"></script>
	<script src="./scripts/init.js"></script>
	<script src="./scripts/shortcutActions.js"></script>
	<script src="./scripts/categoryActions.js"></script>
	<script src="./scripts/prompting.js"></script>
</body>

</html>
