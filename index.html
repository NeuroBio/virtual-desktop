<!DOCTYPE html>
<html>

<head>
	<meta http-equiv="Content-Security-Policy"
		content="default-src 'self' 'unsafe-inline' data: ; script-src 'self' https://d3js.org;">
	<title>Virtual Desktop</title>
	<link href="./css/main.css" rel="stylesheet" />
	<link href="./css/accordion.css" rel="stylesheet" />
	<link href="./css/dialog.css" rel="stylesheet" />
	<link href="./css/select.css" rel="stylesheet" />
	<link href="./css/context-menu.css" rel="stylesheet" />
</head>

<body>
	<div class="frame">
		<div id="categories">

		</div>

		<footer>
			<button onClick="addCategory()">+ Category</button>
		</footer>
	</div>


	<dialog id="confirm-prompt">
		<form method="dialog" class="dialog-text">
			<p id="confirm-text"></p>
			<hr>
			<div class="dialog-actions">
				<button value="cancel">Cancel</button>
				<button value="submit">OK</button>
			</div>
		</form>
	</dialog>

	<dialog id="input-prompt">
		<form method="dialog">
			<p id="input-text" class="dialog-text"></p>
			<div class="field">
				<label id="input-prompt-label" for="input-prompt-input"></label>
				<input type="text" id="input-prompt-input" name="input" required>
			</div>
			<hr>
			<div class="dialog-actions">
				<button value="submit">Submit</button>
			</div>
		</form>
	</dialog>

	<dialog id="select-prompt">
		<form method="dialog">
			<p id="select-text" class="dialog-text"></p>
			<div class="field">
				<select id="select-prompt-select">
				</select>
			</div>
			<hr>
			<div class="dialog-actions">
				<button value="submit">Submit</button>
			</div>
		</form>
	</dialog>

	<dialog id="category-settings-prompt">
		<form method="dialog">
			<p id="category-settings-text" class="dialog-text"></p>
			<div class="field">
				<label id="category-settings-input-label" for="category-settings-input">Name</label>
				<input type="text" id="category-settings-input" name="input" required>
			</div>
			<div class="checkbox-field">
				<label id="category-settings-checkbox-label" for="category-settings-checkbox">Default Open</label>
				<input type="checkbox" id="category-settings-checkbox">
			</div>

			<hr>
			<div class="dialog-actions">
				<button value="submit">Submit</button>
			</div>
		</form>
	</dialog>

	<dialog id="icon-prompt">
		<form method="dialog">
			<p id="icon-prompt-text" class="dialog-text"></p>
			<div class="image-preview-container">
				<div class="field">
					<select id="icon-prompt-select">
					</select>
				</div>
				<img id="icon-prompt-preview">

			</div>
			<hr>
			<div class="dialog-actions">
				<button value="submit">Submit</button>
			</div>
		</form>
	</dialog>


	<ul id="context-menu" class="context-menu" style="display: none;">
		<span id="context-menu-name"></span>
		<li class="context-menu-item" id="rename-shortcut">Rename</li>
		<li class="context-menu-item" id="modify-icon">Modify Icon</li>
		<li class="context-menu-item" id="remove-shortcut">Remove</li>
		<li class="context-menu-item" id="move-shortcut">Move</li>
	</ul>

	<script src="https://d3js.org/d3.v5.min.js"></script>
	<script src="./scripts/populateIcons.js"></script>
	<script src="./scripts/init.js"></script>
	<script src="./scripts/shortcutActions.js"></script>
	<script src="./scripts/categoryActions.js"></script>
	<script src="./scripts/dragAndDrop.js"></script>
	<script src="./scripts/prompting.js"></script>
	<script src="./scripts/accordion.js"></script>
</body>

</html>
