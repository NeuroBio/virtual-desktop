<!DOCTYPE html>
<html>

<head>
	<title>Virtual Desktop</title>
	<link href="./css/main.css" rel="stylesheet" />
	<link href="./css/accordion.css" rel="stylesheet" />
</head>

<body>
	<button>+ Category</button>
	<section class="accordion is-open">
		<h2 class="accordion-header">
			<span>
				<button class="accordion-icon"></button>
				Writing
			</span>
			<div class="add-buttons">
				<button onclick="addFileShortcut('Writing')">+ File</button>
				<button onclick="addFolderShortcut('Writing')">+ Folder</button>
			</div>
		</h2>
		<div class="accordion-body">
			<div id="writing-shortcuts" class="shortcut-container">

			</div>
		</div>
	</section>


	<ul id="context-menu" class="context-menu" style="display: none;">
		<li class="context-menu-item" id="rename-shortcut">Rename</li>
		<li class="context-menu-item" id="remove-shortcut">Remove</li>
	</ul>

	<script src="https://d3js.org/d3.v5.min.js"></script>
	<script src="./scripts/populateIcons.js"></script>
	<script src="./scripts/init.js"></script>
	<script src="./scripts/addShortcut.js"></script>
</body>

</html>
